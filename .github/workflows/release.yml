name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build .app bundle
        run: bash build-app.sh ${{ matrix.target }}

      - name: Package .app as zip
        run: |
          cd target/${{ matrix.target }}/release/bundle/osx
          zip -r ../../../../../"VibeCat-${{ matrix.target }}.zip" "VibeCat.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeCat-${{ matrix.target }}
          path: VibeCat-${{ matrix.target }}.zip

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/vibe-cat.exe" -DestinationPath "VibeCat-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeCat-${{ matrix.target }}
          path: VibeCat-${{ matrix.target }}.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
